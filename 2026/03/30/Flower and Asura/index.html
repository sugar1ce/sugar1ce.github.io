<!--more>
《群花绽放、彷如修罗》
如同春天一般，温暖、清爽、芬芳
这便是这部番给我的感受
这部由studio bind制作，武田绫乃老师原作（京吹作者）的1月新番，毫无疑问夺得了1月份我最喜欢的作品这一称号
在一月这个话题作较少原创又高开低走的淡季里，花修罗给我带来了相当美妙的追番体验，下面我想要安利安利这部稍微有点冷门的佳作
小女主花奈从小热爱朗读，以来到岛上的瑞希学姐的邀请为契机加入了广播部，度过了一段快乐且充实的时光并且与广播部的大家成为了朋友，同时理清了热爱与目标之间的关系，继续向着更高的目标而前进。
正是这样一个有点“样板戏”的故事，在武田老师的笔下和制作组的画中却洋溢着满满的青春感与阳光感——可爱真诚的小花奈、认真且努力着的夏江、认真却有一丝丝叛逆的秋山以及天才且追求完美的冬贺、乐观阳光的学姐，以及性格各异的广播部众人。在制作组的细腻刻画下每个角色性格都变得鲜活起来，形象也跃然“屏”上。这对于一个主角团人数众多的的社团题材作品是相当不容易的一件事，而花修罗的制作组出色地完成了这一任务，主角们立体而完整，在屏幕里的平行世界里肆意的生长着，挥散着青春的光芒。
然后我想提一嘴我们的小动物女主花奈，首先花奈的配音演员真的相当厉害，身为新人将花奈的真诚与偶尔的羞涩内敛完美的通过声音演绎了出来，配合制作组的满满厨力，一只可爱的花奈便出现在了我们的眼前。真的会有人不喜欢这么可爱的女主吗？花奈真的好可爱！！！😫😫😫
再说到制作方面，制作组也是为我们递上了一张完美的答卷。可能制作称不上豪华，但也是相当的清爽流畅，各种表情的小细节和小动作也经过了精心的设计，看得出来制作组满满的用心与热爱❤
本作的一大主题便是“朗诵”。在如何表现朗诵这一主题内容上制作组也是用尽了心思，每集精心制作的“领域展开”，在我看来就是很好的一种处理方式，而并非某些人口中的“用力过猛”。通过意识流形式的画面表现，不但在传统叙事中插入情感意识流动，更符合“朗诵”这一本就稍显情感流的表达形式，我也相当的喜欢。可能“朗诵这一主题并非所有的人都能“get”到，但我认为制作组已经做了最大的努力将它展现到我们每一个普通观众的面前，足显制作组的满满诚意。
最后说说花修罗的音乐吧。虽然不像京紫和芙莉莲那样有着那么丰富且优秀的ost，但是我也可以看出花修罗的配乐也是有着精心设计的，比如最后一话的隔空朗诵，配乐便与有力的朗诵相配合，既不喧宾夺主也充满了记忆点。然后本作的oped都是相当优秀的音乐作品，op轻快活跃，充满了青春感，而ed则是有一种海风般的清爽感，更是我本季度最喜欢的ed之一。
反正我要狠狠安利这部作品，同时也要感谢这三个月来花修罗带给我的欢乐（每次看花修罗的时候嘴角就没有下去过😋）（制作组是真的有货也有活的我是真的可以get到😡）（赶紧给我出第二季啊kora）
春山之上，群花绽放❀❀❀

**假借他意亦无伤大雅，**
**伝えるんだ，**

**誰かの想いも連れて行ける，**
**携一缕思念，同行于远方，**
**待っていて，**

**静待这音籁（如山涧初雪），**

**静待思绪万千（如春日初芽），**
**僕を，**
**守候着我，**
**信じてよ，**
**坚信吧。**
